# Declarative Dapr Subscription — routes messages on the `line-item.enriched`
# topic via `pubsub-rabbitmq` to `rollup-svc`'s `/events/line-item-enriched`
# endpoint. Scoped so ONLY rollup-svc receives these; other apps subscribing
# to the same component would need their own subscription with their own scope.

apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: sub-line-item-enriched
  namespace: default
spec:
  topic: line-item.enriched
  pubsubname: pubsub-rabbitmq
  routes:
    default: /events/line-item-enriched
scopes:
  - rollup-svc
