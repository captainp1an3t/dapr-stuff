# Dapr secret store — Kubernetes Secrets, named `secretstore-kubernetes`.
# Any Dapr-enabled pod in `default` can read secrets via:
#   GET /v1.0/secrets/secretstore-kubernetes/<secret-name>
# Response is a JSON object of {key: value} for every data key in the Secret.
#
# The Kubernetes secret-store type uses the running pod's ServiceAccount for
# API access — so the pod's SA needs `get secrets` in the namespace, either
# via a Role/RoleBinding (see deploy/apps/secret-demo.yaml) or via a
# cluster-wide grant.

apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore-kubernetes
  namespace: default
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []
