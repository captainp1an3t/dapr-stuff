apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: data
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: mgmt
      port: 15672
      targetPort: mgmt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          env:
            # Default 'guest' is localhost-only per RabbitMQ policy; override
            # with our own user so Dapr can connect from the app pod.
            - name: RABBITMQ_DEFAULT_USER
              value: dapr
            - name: RABBITMQ_DEFAULT_PASS
              value: daprdemo
          ports:
            - name: amqp
              containerPort: 5672
            - name: mgmt
              containerPort: 15672
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command: [rabbitmq-diagnostics, check_port_connectivity]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: [rabbitmq-diagnostics, ping]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
