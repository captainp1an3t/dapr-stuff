apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollup-svc-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollup-svc
  labels:
    app: rollup-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollup-svc
  template:
    metadata:
      labels:
        app: rollup-svc
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "rollup-svc"
        dapr.io/app-port: "8080"
        dapr.io/app-protocol: "http"
        dapr.io/config: "appconfig"
    spec:
      serviceAccountName: rollup-svc-sa
      containers:
        - name: rollup
          image: dapr-stuff/rollup-svc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rollup-svc
spec:
  selector:
    app: rollup-svc
  ports:
    - name: http
      port: 8080
      targetPort: http
