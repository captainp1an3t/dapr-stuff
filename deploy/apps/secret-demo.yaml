# Demo Secret + minimal RBAC for the pods that need to read it via Dapr.
# Named to foreshadow T13's notifier-svc use case (Slack webhook + API key).

apiVersion: v1
kind: Secret
metadata:
  name: demo-secret
  namespace: default
type: Opaque
stringData:
  slack-webhook-url: "https://hooks.example.local/T00000/B00000/XXXXX"
  api-key: "sk-demo-1234567890"
