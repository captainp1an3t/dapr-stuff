apiVersion: v1
kind: ServiceAccount
metadata:
  name: triage-svc-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-svc
  labels:
    app: triage-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage-svc
  template:
    metadata:
      labels:
        app: triage-svc
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "triage-svc"
        dapr.io/app-port: "8080"
        dapr.io/app-protocol: "http"
        dapr.io/config: "appconfig"
    spec:
      serviceAccountName: triage-svc-sa
      containers:
        - name: triage
          image: dapr-stuff/triage-svc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # T12 workflow tuning. 30s + 2 escalations = the minimum that
            # gives a real human a realistic ack window (see notification,
            # open page, read, click). Production would set these much
            # higher (5–15 minutes per round, with the last round routed
            # to a different recipient / channel). Verify tolerates the
            # ~120s worst-case timeout-path run.
            - name: ACK_TIMEOUT_SECONDS
              value: "30"
            - name: MAX_ESCALATIONS
              value: "2"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: triage-svc
spec:
  selector:
    app: triage-svc
  ports:
    - name: http
      port: 8080
      targetPort: http
